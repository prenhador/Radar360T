<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar 360 - Brasil</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .radar-card { transition: all 0.2s ease; }
        .radar-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px -10px rgba(0,0,0,0.5); }
        /* Esconder scrollbar mantendo funcionalidade */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <header class="bg-slate-800 border-b border-slate-700 sticky top-0 z-50 shadow-2xl">
        <div class="max-w-7xl mx-auto p-4 md:p-6">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-6">
                <h1 class="text-2xl md:text-3xl font-black tracking-tighter bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
                    RADAR 360 <span class="text-xs font-mono text-slate-500 border border-slate-700 px-2 py-1 rounded ml-2">v3.5</span>
                </h1>
                <div id="stats" class="text-emerald-400 font-mono bg-emerald-500/10 px-4 py-2 rounded-full border border-emerald-500/20 text-sm">
                    A carregar dados...
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
                <div class="md:col-span-2">
                    <input type="text" id="search" placeholder="Pesquisar Município ou Local..." 
                        class="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500 text-slate-200"
                        oninput="applyFilters()">
                </div>
                <div>
                    <select id="filterRegiao" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500" onchange="applyFilters()">
                        <option value="todos">Todas as Regiões</option>
                        <option value="norte">Norte</option>
                        <option value="nordeste">Nordeste</option>
                        <option value="centro">Centro-Oeste</option>
                        <option value="sudeste">Sudeste</option>
                        <option value="sul">Sul</option>
                    </select>
                </div>
                <div>
                    <select id="filterStatus" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500" onchange="applyFilters()">
                        <option value="todos">Todos os Status</option>
                        <option value="valido">Válidos</option>
                        <option value="vencido">⚠️ Vencidos</option>
                    </select>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-6">
        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <script>
        // O ROBÔ CONTINUA A INJETAR OS DADOS NESTA LINHA:
        let rawData = [];
        let filteredData = [];

        function applyFilters() {
            const searchTerm = document.getElementById('search').value.toLowerCase();
            const regiao = document.getElementById('filterRegiao').value;
            const status = document.getElementById('filterStatus').value;

            filteredData = rawData.filter(item => {
                const matchesSearch = item.mun.toLowerCase().includes(searchTerm) || 
                                     item.local.toLowerCase().includes(searchTerm);
                
                const matchesRegiao = regiao === 'todos' || item.regiao === regiao;
                
                let matchesStatus = true;
                if (status === 'valido') matchesStatus = !item.vencido;
                if (status === 'vencido') matchesStatus = item.vencido;

                return matchesSearch && matchesRegiao && matchesStatus;
            });

            render();
        }

        function render() {
            const grid = document.getElementById('grid');
            const stats = document.getElementById('stats');
            
            stats.innerText = `${filteredData.length} radares encontrados`;

            if (filteredData.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-20 bg-slate-800/50 rounded-2xl border-2 border-dashed border-slate-700">
                        <p class="text-slate-500 text-lg">Nenhum radar encontrado com estes filtros.</p>
                    </div>`;
                return;
            }

            grid.innerHTML = filteredData.map(r => `
                <div class="radar-card bg-slate-800 border border-slate-700 rounded-2xl overflow-hidden shadow-lg">
                    <div class="p-5">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <span class="bg-blue-500/10 text-blue-400 border border-blue-500/20 px-2 py-1 rounded text-[10px] font-bold uppercase tracking-wider">${r.uf}</span>
                                <h3 class="text-slate-100 font-bold mt-1">${r.mun}</h3>
                            </div>
                            <div class="text-right">
                                <span class="text-2xl font-black text-emerald-400 block">${r.vel}</span>
                                <span class="text-[10px] text-slate-500 uppercase font-bold">km/h</span>
                            </div>
                        </div>
                        
                        <p class="text-slate-400 text-xs leading-relaxed mb-4 min-h-[32px]">${r.local}</p>
                        
                        <div class="space-y-2">
                            <div class="flex justify-between items-center bg-slate-900/50 p-2 rounded-lg border border-slate-700/50">
                                <span class="text-[10px] text-slate-500 uppercase">Validade</span>
                                <span class="text-xs font-mono ${r.vencido ? 'text-red-400 font-bold' : 'text-slate-300'}">
                                    ${r.vencido ? '⚠️ ' : ''}${r.data}
                                </span>
                            </div>
                            <div class="flex justify-between items-center p-2">
                                <span class="text-[10px] text-slate-500 uppercase">Categoria</span>
                                <span class="text-[10px] text-slate-300 font-medium">${r.cat}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.onload = () => {
            if (rawData.length > 0) {
                applyFilters();
            } else {
                document.getElementById('stats').innerText = "Aguardando Robô...";
                document.getElementById('grid').innerHTML = `
                    <div class="col-span-full text-center py-20">
                        <div class="animate-spin h-8 w-8 border-4 border-blue-500 border-t-transparent rounded-full mx-auto mb-4"></div>
                        <p class="text-slate-500">A processar base de dados do Inmetro...</p>
                    </div>`;
            }
        };

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>
</html>
