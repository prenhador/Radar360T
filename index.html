<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar 360 - Brasil</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .radar-card { transition: all 0.3s ease; }
        .radar-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">

    <header class="bg-slate-800 p-6 shadow-xl border-b border-slate-700">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
                RADAR 360 <span class="text-sm font-light text-slate-400 ml-2">v3.0 Auto</span>
            </h1>
            <div id="stats" class="text-emerald-400 font-mono text-lg">A carregar radares...</div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6">
        <div id="grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <script>
        // O ROBÔ VAI SUBSTITUIR ESTA LINHA:
        let rawData = [];
        let filteredData = [];

        function render() {
            const grid = document.getElementById('grid');
            const stats = document.getElementById('stats');
            
            if (rawData.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center p-20 text-slate-500">Nenhum dado carregado pelo Robô ainda.</div>';
                stats.innerText = "Aguardando atualização do Robô...";
                return;
            }

            // Se houver dados, preenchemos o filteredData
            filteredData = [...rawData];
            stats.innerText = `${filteredData.length} radares ativos no Brasil`;

            grid.innerHTML = filteredData.map(r => `
                <div class="radar-card bg-slate-800 border border-slate-700 rounded-xl p-5">
                    <div class="flex justify-between items-start mb-4">
                        <span class="bg-blue-500/20 text-blue-400 px-3 py-1 rounded-full text-xs font-bold">${r.uf} - ${r.mun}</span>
                        <span class="text-2xl font-black text-emerald-400">${r.vel} <small class="text-xs font-normal text-slate-500">km/h</small></span>
                    </div>
                    <p class="text-slate-300 text-sm mb-3 h-10 overflow-hidden">${r.local}</p>
                    <div class="flex justify-between items-center text-xs text-slate-500 border-t border-slate-700 pt-3">
                        <span>Validade: <b class="${r.vencido ? 'text-red-400' : 'text-slate-300'}">${r.data}</b></span>
                        <span class="capitalize">${r.cat}</span>
                    </div>
                </div>
            `).join('');
        }

        // Tenta renderizar assim que a página abre
        window.onload = render;

        // Registo do Service Worker para PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>
</html>
